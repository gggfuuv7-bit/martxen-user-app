name: martxen_user
description: MartXen - Multi-vendor E-commerce User App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  flutter_svg: ^2.0.9

  # Utils
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/favicon.png
    - assets/images/gs_logo.jpg
    - assets/images/happy_store.webp
    - assets/images/hero_model_img.png
    - assets/images/hero_product_img1.png
    - assets/images/hero_product_img2.png
    - assets/images/product_img1.png
    - assets/images/product_img2.png
    - assets/images/product_img3.png
    - assets/images/product_img4.png
    - assets/images/product_img5.png
    - assets/images/product_img6.png
    - assets/images/product_img7.png
    - assets/images/product_img8.png
    - assets/images/product_img9.png
    - assets/images/product_img10.png
    - assets/images/product_img11.png
    - assets/images/product_img12.png
    - assets/images/product_img13.png
    - assets/images/product_img14.png
    - assets/images/product_img15.png
    - assets/images/product_img16.png
    - assets/images/profile_pic1.jpg
    - assets/images/profile_pic2.jpg
    - assets/images/profile_pic3.jpg
    - assets/images/upload_area.svg
